<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 الأذكار اليومية</title>
    
    <!-- ===== PWA Meta ===== -->
    <meta name="theme-color" content="#d4af37">
    <link rel="manifest" id="manifest-link">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الأذكار">
    <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgo=" id="apple-touch-icon">

    <style>
        /* ===== نفس التنسيقات السابقة (بدون تغيير) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Amiri', 'Scheherazade New', serif;
            background: #fdf8f0;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(212,175,55,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(92,138,116,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(183,149,87,0.03) 0%, transparent 70%);
            min-height: 100vh;
            color: #3e3a32;
            line-height: 1.8;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image: repeating-conic-gradient(#b7955b 0% 25%, transparent 0% 50%) 50% / 80px 80px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 28px 20px 18px;
            position: relative;
        }
        .header-icon {
            font-size: 52px;
            display: block;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-10px); }
        }
        .header h1 {
            font-family: 'Amiri', 'Scheherazade New', serif;
            font-size: 2.3em;
            font-weight: 700;
            color: #5c3d2e;
            letter-spacing: 1px;
            margin: 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .header .subtitle {
            font-size: 0.95em;
            color: #8b7355;
            margin-top: 2px;
            font-weight: 400;
        }
        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #d4af37, #c9973b, #d4af37);
            margin: 10px auto 0;
            border-radius: 3px;
            opacity: 0.7;
        }
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 18px;
            background: #fffdf8;
            border-radius: 20px;
            padding: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 0 1px rgba(180,150,100,0.15);
            position: sticky;
            top: 12px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        .tab-btn {
            flex: 1;
            min-width: 70px;
            padding: 11px 14px;
            border: none;
            background: transparent;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            color: #6b5e4e;
            transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
            white-space: nowrap;
            position: relative;
        }
        .tab-btn:hover {
            color: #5c3d2e;
            background: rgba(212,175,85,0.08);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #d4af37, #c9973b);
            color: #fff;
            box-shadow: 0 4px 14px rgba(200,150,50,0.35);
            font-weight: 700;
            transform: translateY(-1px);
        }
        .tab-emoji { display: block; font-size: 1.3em; margin-bottom: 2px; }
        .zekr-card {
            background: #fffefb;
            border-radius: 20px;
            padding: 20px 22px;
            margin-bottom: 12px;
            box-shadow: 0 3px 16px rgba(0,0,0,0.04), 0 0 0 1px rgba(180,150,100,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border-right: 4px solid transparent;
        }
        .zekr-card:hover {
            box-shadow: 0 8px 28px rgba(0,0,0,0.07), 0 0 0 1px rgba(200,160,80,0.2);
            border-right-color: #d4af37;
            transform: translateX(-2px);
        }
        .zekr-card:active { transform: scale(0.985); transition: transform 0.1s; }
        .zekr-card.completed {
            background: #f9fdf7;
            border-right-color: #6b9b6b;
            opacity: 0.75;
        }
        .zekr-card.completed .zekr-text { color: #5a7a5a; }
        .zekr-card::after {
            content: '';
            position: absolute;
            top: -30px; left: -30px;
            width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(212,175,85,0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .zekr-text {
            font-family: 'Amiri', 'Scheherazade New', serif;
            font-size: 1.25em;
            line-height: 2;
            color: #3e3530;
            margin-bottom: 12px;
            text-align: justify;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .zekr-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .zekr-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fdf5e6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.88em;
            font-weight: 600;
            color: #8b6914;
            letter-spacing: 0.5px;
        }
        .zekr-count .count-num {
            background: #d4af37;
            color: #fff;
            width: 26px; height: 26px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            font-weight: 700;
        }
        .zekr-fadl {
            font-size: 0.82em;
            color: #7a9a6a;
            font-style: italic;
            max-width: 55%;
            text-align: left;
            line-height: 1.5;
        }
        .progress-dots { display: flex; gap: 4px; align-items: center; }
        .progress-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #e0d5c0;
            transition: all 0.3s;
        }
        .progress-dot.done {
            background: #6b9b6b;
            box-shadow: 0 0 4px rgba(107,155,107,0.4);
        }
        .tasbih-section {
            background: linear-gradient(145deg, #fffefb, #fdf8ef);
            border-radius: 24px;
            padding: 22px 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 6px 24px rgba(0,0,0,0.05), 0 0 0 1px rgba(180,150,100,0.12);
            position: relative;
            overflow: hidden;
        }
        .tasbih-section::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(212,175,85,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .tasbih-label {
            font-size: 0.9em;
            color: #8b7355;
            margin-bottom: 6px;
            font-weight: 500;
            position: relative;
        }
        .tasbih-display {
            font-family: 'Cairo', sans-serif;
            font-size: 4.5em;
            font-weight: 700;
            color: #5c3d2e;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.2s ease;
            user-select: none;
        }
        .tasbih-display.pulse { animation: pulseCount 0.3s ease-out; }
        @keyframes pulseCount {
            0%{ transform: scale(1.15); color: #d4af37; }
            100%{ transform: scale(1); color: #5c3d2e; }
        }
        .tasbih-target { font-size: 0.85em; color: #a09080; margin-bottom: 12px; }
        .tasbih-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }
        .btn-tasbih {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 1.6em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .btn-tasbih:active { transform: scale(0.9); }
        .btn-count {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #fff;
            font-size: 2em;
            font-weight: 700;
            width: 80px; height: 80px;
            box-shadow: 0 6px 22px rgba(200,150,50,0.4);
        }
        .btn-count:hover { box-shadow: 0 8px 28px rgba(200,150,50,0.55); }
        .btn-reset { background: #f5f0e8; color: #6b5e4e; font-size: 0.85em; font-weight: 600; }
        .btn-reset:hover { background: #ebe3d5; }
        .btn-preset {
            background: #fff;
            color: #5c3d2e;
            border: 2px solid #e0d5c0;
            font-size: 0.8em;
            font-weight: 700;
        }
        .btn-preset:hover { border-color: #d4af37; color: #d4af37; }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #b0a090;
        }
        .empty-state .empty-icon { font-size: 60px; display: block; margin-bottom: 10px; opacity: 0.6; }
        .empty-state p { font-size: 1.1em; }
        .footer {
            text-align: center;
            padding: 20px;
            color: #b0a090;
            font-size: 0.8em;
            margin-top: 10px;
        }
        .footer span { color: #d4af37; }
        .progress-bar-wrap {
            background: #e8e0d3;
            border-radius: 10px;
            height: 6px;
            margin: 8px 0 0;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #c9973b);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .zekr-card { animation: fadeInUp 0.5s ease forwards; }
        .zekr-card:nth-child(1){ animation-delay: 0s; }
        .zekr-card:nth-child(2){ animation-delay: 0.06s; }
        .zekr-card:nth-child(3){ animation-delay: 0.12s; }
        .zekr-card:nth-child(4){ animation-delay: 0.18s; }
        .zekr-card:nth-child(5){ animation-delay: 0.24s; }
        .zekr-card:nth-child(6){ animation-delay: 0.3s; }
        .zekr-card:nth-child(7){ animation-delay: 0.36s; }
        .zekr-card:nth-child(8){ animation-delay: 0.42s; }
        @media (max-width: 480px) {
            .header h1 { font-size: 1.7em; }
            .header-icon { font-size: 38px; }
            .zekr-text { font-size: 1.1em; line-height: 1.8; }
            .zekr-card { padding: 15px 16px; }
            .tab-btn { font-size: 0.78em; padding: 9px 8px; border-radius: 14px; }
            .tab-emoji { font-size: 1.1em; }
            .tasbih-display { font-size: 3.2em; }
            .btn-count { width: 65px; height: 65px; font-size: 1.6em; }
            .btn-tasbih { width: 48px; height: 48px; font-size: 1.2em; }
            .zekr-fadl { max-width: 100%; text-align: right; }
        }
    </style>
    <!-- خطوط عربية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;800&family=Scheherazade+New:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <span class="header-icon">🌙</span>
            <h1>الأذكار اليومية</h1>
            <p class="subtitle">﴿ أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ ﴾</p>
            <div class="divider"></div>
        </header>

        <nav class="tabs" id="tabsNav">
            <button class="tab-btn active" data-tab="sabah"><span class="tab-emoji">☀️</span> الصباح</button>
            <button class="tab-btn" data-tab="masaa"><span class="tab-emoji">🌆</span> المساء</button>
            <button class="tab-btn" data-tab="salah"><span class="tab-emoji">🕌</span> بعد الصلاة</button>
            <button class="tab-btn" data-tab="nawm"><span class="tab-emoji">🌙</span> النوم</button>
            <button class="tab-btn" data-tab="tasbih-tab"><span class="tab-emoji">📿</span> تسبيح</button>
        </nav>

        <main id="zekrContent"></main>

        <section class="tasbih-section" id="tasbihSection" style="display:none;">
            <div class="tasbih-label">📿 عداد التسبيح</div>
            <div class="tasbih-display" id="tasbihDisplay">0</div>
            <div class="tasbih-target" id="tasbihTarget">الهدف: 33 / 100</div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="tasbihProgress" style="width:0%"></div></div>
            <div class="tasbih-buttons" style="margin-top:14px;">
                <button class="btn-tasbih btn-preset" onclick="setTasbihTarget(33)">٣٣</button>
                <button class="btn-tasbih btn-reset" onclick="resetTasbih()">↺</button>
                <button class="btn-tasbih btn-count" onclick="incrementTasbih()">+</button>
                <button class="btn-tasbih btn-reset" onclick="decrementTasbih()">−</button>
                <button class="btn-tasbih btn-preset" onclick="setTasbihTarget(100)">١٠٠</button>
            </div>
        </section>

        <footer class="footer">
            <p>صُنع بـ <span>❤</span> · الأذكار من الكتاب والسنة</p>
        </footer>
    </div>

    <script>
        // ===== بيانات الأذكار =====
        const azkarData = {
            sabah: [
                { text: 'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ، بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ. ﴿اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...﴾ [آية الكرسي - البقرة 255]', count: 1, fadl: 'من قالها حين يصبح أجير من الجن حتى يمسي' },
                { text: 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ ﴿قُلْ هُوَ اللَّهُ أَحَدٌ ١ اللَّهُ الصَّمَدُ ٢...﴾ [الإخلاص] + المعوذتين', count: 3, fadl: 'تكفيك من كل شيء (ثلاث مرات)' },
                { text: 'أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ', count: 1, fadl: 'من قالها حين يصبح أدى شكر يومه' },
                { text: 'اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ', count: 1, fadl: 'ذكر عظيم للصباح' },
                { text: 'سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ', count: 3, fadl: 'كلمات ثقيلة في الميزان' },
                { text: 'اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا', count: 1, fadl: 'دعاء جامع للخير' },
                { text: 'رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا', count: 3, fadl: 'من قالها ثلاثًا وجبت له الجنة' },
                { text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ', count: 10, fadl: 'عشر مرات: كمن أعتق أربع أنفس من ولد إسماعيل' }
            ],
            masaa: [
                { text: 'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ. ﴿اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...﴾ [آية الكرسي]', count: 1, fadl: 'من قالها حين يمسي أجير من الجن حتى يصبح' },
                { text: 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ ﴿قُلْ هُوَ اللَّهُ أَحَدٌ...﴾ + المعوذتين', count: 3, fadl: 'تكفيك من كل شيء (ثلاث مرات)' },
                { text: 'أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ', count: 1, fadl: 'ذكر المساء المبارك' },
                { text: 'اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ الْمَصِيرُ', count: 1, fadl: 'دعاء المساء' },
                { text: 'أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ', count: 3, fadl: 'حرز من كل شر' },
                { text: 'اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ', count: 1, fadl: 'دعاء شامل للعافية' },
                { text: 'رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا', count: 3, fadl: 'من قالها ثلاثًا وجبت له الجنة' },
                { text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ', count: 10, fadl: 'عشر مرات: كمن أعتق أربع أنفس' }
            ],
            salah: [
                { text: 'أَسْتَغْفِرُ اللَّهَ (ثلاثًا)، اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ', count: 1, fadl: 'يقال بعد التسليم مباشرة' },
                { text: 'سُبْحَانَ اللَّهِ', count: 33, fadl: 'التسبيح بعد الصلاة' },
                { text: 'الْحَمْدُ لِلَّهِ', count: 33, fadl: 'التحميد بعد الصلاة' },
                { text: 'اللَّهُ أَكْبَرُ', count: 33, fadl: 'التكبير بعد الصلاة' },
                { text: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ', count: 1, fadl: 'ختام الصلاة' },
                { text: 'اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ', count: 1, fadl: 'دعاء بعد الصلاة' }
            ],
            nawm: [
                { text: 'بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا', count: 1, fadl: 'يقال عند النوم' },
                { text: 'اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ', count: 1, fadl: 'دعاء قبل النوم' },
                { text: 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ ﴿قُلْ هُوَ اللَّهُ أَحَدٌ...﴾ + المعوذتين', count: 3, fadl: 'ينفث في كفيه ويمسح بهما جسده' },
                { text: 'سُبْحَانَ اللَّهِ', count: 33, fadl: 'تسبيح قبل النوم' },
                { text: 'الْحَمْدُ لِلَّهِ', count: 33, fadl: 'تحميد قبل النوم' },
                { text: 'اللَّهُ أَكْبَرُ', count: 34, fadl: 'تكبير قبل النوم (خير من خادم)' }
            ]
        };

        let currentTab = 'sabah';
        let tasbihCount = parseInt(localStorage.getItem('tasbih_count') || '0');
        let tasbihTarget = parseInt(localStorage.getItem('tasbih_target') || '33');

        function updateTasbihDisplay() {
            const display = document.getElementById('tasbihDisplay');
            const targetEl = document.getElementById('tasbihTarget');
            const progress = document.getElementById('tasbihProgress');
            if (display) {
                display.textContent = tasbihCount;
                targetEl.textContent = `الهدف: ${tasbihTarget}`;
                const pct = Math.min((tasbihCount / tasbihTarget) * 100, 100);
                progress.style.width = pct + '%';
            }
        }

        function incrementTasbih() {
            tasbihCount++;
            saveTasbihState();
            const display = document.getElementById('tasbihDisplay');
            if (display) {
                display.classList.remove('pulse');
                void display.offsetWidth;
                display.classList.add('pulse');
            }
            updateTasbihDisplay();
            if (navigator.vibrate && tasbihCount % 33 === 0) navigator.vibrate(15);
        }

        function decrementTasbih() {
            if (tasbihCount > 0) {
                tasbihCount--;
                saveTasbihState();
                updateTasbihDisplay();
            }
        }

        function resetTasbih() {
            if (tasbihCount > 0 && !confirm('هل تريد تصفير العداد؟')) return;
            tasbihCount = 0;
            saveTasbihState();
            updateTasbihDisplay();
        }

        function setTasbihTarget(target) {
            tasbihTarget = target;
            tasbihCount = 0;
            saveTasbihState();
            updateTasbihDisplay();
        }

        function saveTasbihState() {
            localStorage.setItem('tasbih_count', tasbihCount);
            localStorage.setItem('tasbih_target', tasbihTarget);
        }

        function renderAzkar(tabKey) {
            const container = document.getElementById('zekrContent');
            const tasbihSection = document.getElementById('tasbihSection');
            const zekrList = azkarData[tabKey];

            if (tabKey === 'tasbih-tab') {
                container.innerHTML = '';
                tasbihSection.style.display = 'block';
                updateTasbihDisplay();
                return;
            }

            tasbihSection.style.display = 'none';

            if (!zekrList || zekrList.length === 0) {
                container.innerHTML = `<div class="empty-state"><span class="empty-icon">📖</span><p>لا توجد أذكار متاحة لهذا القسم حاليًا</p></div>`;
                return;
            }

            const today = new Date().toDateString();
            const storageKey = tabKey + '_' + today;
            let dayProgress = JSON.parse(localStorage.getItem('azkar_day_progress') || '{}');
            if (!dayProgress[storageKey]) dayProgress[storageKey] = {};
            const progress = dayProgress[storageKey];

            let html = '';
            zekrList.forEach((zekr, index) => {
                const zekrId = tabKey + '_' + index;
                const userCount = progress[zekrId] || 0;
                const isDone = userCount >= zekr.count;
                const dotsHTML = Array.from({ length: zekr.count }, (_, i) =>
                    `<span class="progress-dot ${i < userCount ? 'done' : ''}"></span>`
                ).join('');

                html += `
                <div class="zekr-card ${isDone ? 'completed' : ''}" data-zekr-id="${zekrId}" data-count="${zekr.count}" data-current="${userCount}">
                    <div class="zekr-text">${zekr.text}</div>
                    <div class="zekr-meta">
                        <span class="zekr-count">
                            <span class="count-num">${zekr.count}</span> مرات
                            ${zekr.count > 1 ? `<span class="progress-dots">${dotsHTML}</span>` : ''}
                        </span>
                        ${zekr.fadl ? `<span class="zekr-fadl">💎 ${zekr.fadl}</span>` : ''}
                    </div>
                </div>`;
            });

            container.innerHTML = html;

            container.querySelectorAll('.zekr-card').forEach(card => {
                card.addEventListener('click', function() {
                    const zekrId = this.dataset.zekrId;
                    const maxCount = parseInt(this.dataset.count);
                    let current = parseInt(this.dataset.current);
                    if (current < maxCount) {
                        current++;
                        this.dataset.current = current;
                        const dots = this.querySelectorAll('.progress-dot');
                        if (dots[current - 1]) dots[current - 1].classList.add('done');
                        if (current >= maxCount) this.classList.add('completed');
                        saveProgress(tabKey, zekrId, current);
                        if (navigator.vibrate) navigator.vibrate(10);
                        this.style.transform = 'scale(0.97)';
                        setTimeout(() => { this.style.transform = ''; }, 150);
                    }
                });
            });
        }

        function saveProgress(tabKey, zekrId, count) {
            const today = new Date().toDateString();
            const storageKey = tabKey + '_' + today;
            let dayProgress = JSON.parse(localStorage.getItem('azkar_day_progress') || '{}');
            if (!dayProgress[storageKey]) dayProgress[storageKey] = {};
            dayProgress[storageKey][zekrId] = count;
            localStorage.setItem('azkar_day_progress', JSON.stringify(dayProgress));
        }

        function switchTab(tabKey) {
            currentTab = tabKey;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`[data-tab="${tabKey}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            renderAzkar(tabKey);
        }

        document.getElementById('tabsNav').addEventListener('click', function(e) {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            const tabKey = btn.dataset.tab;
            if (tabKey) {
                switchTab(tabKey);
                localStorage.setItem('azkar_current_tab', tabKey);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (currentTab === 'tasbih-tab') {
                if (e.code === 'Space' || e.code === 'Enter') {
                    e.preventDefault();
                    incrementTasbih();
                } else if (e.code === 'KeyR') {
                    resetTasbih();
                } else if (e.code === 'Backspace') {
                    decrementTasbih();
                }
            }
        });

        // ===== PWA: توليد الأيقونات وتسجيل الـ Service Worker =====
        function generateIcons() {
            const sizes = [192, 512];
            const iconContainer = document.createElement('div');
            iconContainer.style.position = 'absolute';
            iconContainer.style.top = '-9999px';
            document.body.appendChild(iconContainer);

            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // خلفية دائرية ذهبية
                ctx.beginPath();
                ctx.arc(size/2, size/2, size/2 - 4, 0, Math.PI * 2);
                ctx.fillStyle = '#d4af37';
                ctx.fill();
                ctx.strokeStyle = '#b8942e';
                ctx.lineWidth = size * 0.02;
                ctx.stroke();

                // رمز القمر
                ctx.font = `${size * 0.55}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                ctx.fillText('🌙', size/2, size/2);

                const dataUrl = canvas.toDataURL('image/png');
                if (size === 192) {
                    document.getElementById('apple-touch-icon').href = dataUrl;
                }
                // حفظ في window للاستخدام في manifest
                if (!window.generatedIcons) window.generatedIcons = {};
                window.generatedIcons[size] = dataUrl;
            });
            document.body.removeChild(iconContainer);
        }

        function setupPwa() {
            generateIcons();

            // إنشاء manifest JSON
            const manifest = {
                name: "الأذكار اليومية",
                short_name: "أذكار",
                description: "تطبيق الأذكار اليومية مع عداد تسبيح",
                start_url: ".",
                display: "standalone",
                background_color: "#fdf8f0",
                theme_color: "#d4af37",
                orientation: "portrait-primary",
                icons: [
                    { src: window.generatedIcons[192], sizes: "192x192", type: "image/png" },
                    { src: window.generatedIcons[512], sizes: "512x512", type: "image/png" }
                ]
            };

            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const manifestURL = URL.createObjectURL(manifestBlob);
            document.getElementById('manifest-link').href = manifestURL;

            // تسجيل Service Worker من Blob (يدعم Chrome, Edge, Opera)
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'azkar-v2';
                    const urlsToCache = [
                        '.',
                        'index.html',
                        'manifest.json'
                    ];

                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then(cache => {
                                return cache.addAll(urlsToCache).catch(err => {
                                    console.warn('بعض الملفات لم تخزن مؤقتاً', err);
                                });
                            })
                        );
                    });

                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request).then(response => {
                                return response || fetch(event.request).then(fetchResponse => {
                                    if (event.request.method === 'GET') {
                                        const responseClone = fetchResponse.clone();
                                        caches.open(CACHE_NAME).then(cache => {
                                            cache.put(event.request, responseClone);
                                        });
                                    }
                                    return fetchResponse;
                                }).catch(() => {
                                    if (event.request.mode === 'navigate') {
                                        return caches.match('index.html');
                                    }
                                });
                            })
                        );
                    });

                    self.addEventListener('activate', event => {
                        event.waitUntil(
                            caches.keys().then(cacheNames => {
                                return Promise.all(
                                    cacheNames.filter(name => name !== CACHE_NAME).map(name => caches.delete(name))
                                );
                            })
                        );
                    });
                `;

                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swURL = URL.createObjectURL(swBlob);

                navigator.serviceWorker.register(swURL)
                    .then(reg => console.log('✅ Service Worker مسجل بنجاح', reg))
                    .catch(err => console.warn('⚠️ تعذر تسجيل Service Worker (قد لا يعمل على المتصفح):', err));
            }
        }

        // ===== بدء التطبيق =====
        function init() {
            setupPwa();
            const savedTab = localStorage.getItem('azkar_current_tab') || 'sabah';
            switchTab(savedTab);
            updateTasbihDisplay();
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
